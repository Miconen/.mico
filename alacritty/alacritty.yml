window:
  opacity: 0.9
  padding:
    x: 0
    y: 0

alt_send_esc: false
key_bindings:
  - { key: Space, mods: Control, chars: "\x00" }

font:
  size: 18
  normal:
    # https://github.com/shaunsingh/SFMono-Nerd-Font-Ligaturized/blob/main/LigaSFMonoNerdFont-Regular.otf
    family: Liga SFMono Nerd Font

colors:

  primary:
    background: '#1b1b25'
    foreground: '#dedede'

  normal:
    black:   '#15121c'
    red:     '#cb5760'
    green:   '#999f63'
    yellow:  '#d4a067'
    blue:    '#6c90a8'
    magenta: '#776690'
    cyan:    '#528a9b'
    white:   '#eeffff'

  bright:
    black:   '#727480'
    red:     '#cb5760'
    green:   '#999f63'
    yellow:  '#d4a067'
    blue:    '#6c90a8'
    magenta: '#776690'
    cyan:    '#528a9b'
    white:   '#eeffff'
